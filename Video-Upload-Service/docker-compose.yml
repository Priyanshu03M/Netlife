version: "3.8"

services:
  minio:
    image: minio/minio:latest
    container_name: minio
    restart: always

    ports:
      - "9000:9000"   # API port (used by your upload service)
      - "9001:9001"   # Console port (browser UI)

    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123

    volumes:
      - minio_data:/data

    command: server /data --console-address ":9001"

volumes:
  minio_data: