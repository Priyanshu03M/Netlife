spring.application.name=AuthService
server.port=8080

#Logs
logging.level.root=INFO
logging.pattern.console=%clr(%d{HH:mm:ss.SSS}){blue} %clr(%-5level){yellow} %clr([%thread]){magenta} %clr(%logger{36}){cyan} %clr(%msg){green}%n

#Database
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/netlife}
spring.datasource.username=${DB_USERNAME:alice}
spring.datasource.password=${DB_PASSWORD:OmagaZ}
spring.datasource.driver-class-name=org.postgresql.Driver

#Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

#JWT
jwt.secret=${JWT_SECRET:N0ZlNBv9QUB5U1RP/K14qiJkxyPkRjmUu9/rTcxGgQQ=}
jwt.expiration-ms=600000
refresh-token-expiration=1

# Eureka Client
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
