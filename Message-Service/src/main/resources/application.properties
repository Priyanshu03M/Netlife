spring.application.name=Message-Service
server.port=8084

#Logs
logging.level.root=INFO
logging.pattern.console=%clr(%d{HH:mm:ss.SSS}){blue} %clr(%-5level){yellow} %clr([%thread]){magenta} %clr(%logger{36}){cyan} - %clr(%msg){green}%n

spring.cloud.stream.bindings.email-in-0.destination=send-communication
spring.cloud.stream.bindings.email-in-0.group=${spring.application.name}

spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
spring.rabbitmq.connection-timeout=10s