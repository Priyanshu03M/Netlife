services:

  eureka-server:
    build: ./eureka-server
    ports:
      - "8761:8761"

  api-gateway:
    build: ./api-gateway
    ports:
      - "8080:8080"
    environment:
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL}
    depends_on:
      - eureka-server

  auth-service:
    build: ./auth-service
    ports:
      - "8081:8080"
    environment:
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL}
    depends_on:
      - db
      - eureka-server
  video-upload-service:
    build: ./Video-Upload-Service
    ports:
      - "8082:8081"
    environment:
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL}
      MINIO_URL: http://minio:9000
      MINIO_ACCESSKEY: ${MINIO_ACCESSKEY:-minioadmin}
      MINIO_SECRETKEY: ${MINIO_SECRETKEY:-minioadmin123}
      MINIO_BUCKET: ${MINIO_BUCKET:-videos}
    depends_on:
      - db
      - eureka-server
      - minio

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
  minio:
    image: minio/minio:latest
    container_name: minio
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

volumes:
  postgres_data:
  minio_data:
